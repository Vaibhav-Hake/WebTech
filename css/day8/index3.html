<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <title>Amazon Header Clone</title>
     <link rel="stylesheet" href="style3.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

     <header class="navbar">

          <div class="nav-logo">
               <img src="https://pngimg.com/uploads/amazon/amazon_PNG11.png" alt="Amazon">
               <span class="in">.in</span>
          </div>


          <div class="nav-location">
               <span class="small-text">Delivering to Pune 411001</span>
               <span class="bold-text">Update location</span>
          </div>


          <div class="nav-search">
               <select>
                    <option>All</option>
               </select>
               <input type="text" placeholder="Search Amazon.in">
               <span><i class="fa-solid fa-magnifying-glass"></i></span>
          </div>


          <div class="nav-lang">
               <img src="flag.png" alt="In"> EN
          </div>


          <div class="nav-account">
               <span class="small-text">Hello, sign in</span>
               <span class="bold-text">Account & Lists</span>
          </div>


          <div class="nav-orders">
               <span class="small-text">Returns</span>
               <span class="bold-text">& Orders</span>
          </div>


          <div class="nav-cart">
               <span><i class="fa-solid fa-cart-shopping"></i></span> Cart
          </div>
     </header>

</body>

</html>
