<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Myntra</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>

<header class="navbar">

    
    <div class="logo">
        <img src="https://www.vhv.rs/dpng/d/413-4134507_myntra-logo-transparent-png-myntra-online-shopping-app.png" alt="Myntra">
    </div>

    
    <div class="menu">
        <span>MEN</span>
        <span>WOMEN</span>
        <span>KIDS</span>
        <span>HOME</span>
        <span>BEAUTY</span>
        <span>STUDIO</span>
    </div>

    
    <div class="search">
      
        <input type="text" placeholder="Search a Products">
    </div>

    <div class="icons">
        <div>
            <i class="fa-regular fa-user"></i>
            <p>Profile</p>
        </div>
        <div>
            <i class="fa-regular fa-heart"></i>
            <p>Wishlist</p>
        </div>
        <div>
            <i class="fa-solid fa-bag-shopping"></i>
            <p>Bag</p>
        </div>
    </div>

</header>
<main>
    <div class="section">
        <h4>Shirts</h4>
        <div class="outercard">
            <div class="incard"><img src="https://tse3.mm.bing.net/th/id/OIP.QiLmwPwg5z_eYH1rhLXMKQHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" alt="" class="card-img">
            <span><h3>Printed Casual</h3></span></div>
            <div class="incard"><img src="https://i5.walmartimages.com/seo/Mens-Slim-Fit-Dress-Shirts-Stretch-Long-Sleeve-Basic-Formal-Shirts-Solid-Business-Casual-Button-Down-Shirts_adc20e04-ded4-474d-834b-e06ac76fec66.c9eb5b69e397ac69fca80cb746dfa1d2.jpeg" alt="" class="card-img">
            <span><h3> Formal</h3></span>
        </div>
            <div class="incard"><img src="" alt="" class="card-img"></div>
            <div class="incard"><img src="" alt="" class="card-img"></div>
            <div class="incard"><img src="" alt="" class="card-img"></div>
            <div class="incard"><img src="" alt="" class="card-img"></div>
            <div class="incard"><img src="https://i5.walmartimages.com/seo/Shirts-for-Men-Winter-Fall-Long-Sleeve-Single-Lapel-Beach-Vacation-Outdoor-Holiday-Shirt-Casual-T-shirt-Tops_d0b3eb78-46dc-4953-8b8f-f90536bdf1cc.687babff4041caa721ff681e72fdeaa1.jpeg" alt="" class="card-img"></div>
        </div>
    </div>
</main>

</body>
</html>
